<!doctype html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Extractor PDF</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body class="noselect">
    <header class="bar">
        <div class="title">Extractor PDF</div>
        <div class="actions">
            <button id="btn-st">📋 Specifica Tecnica (RPC)</button>
            <button id="btn-st211">📝 Specifica Tecnica (211)</button>
            <button id="btn-about">🚀 About</button>
        </div>
    </header>

    <main class="main">

        <div class="centerWrap">
            <!--<p class="muted">Seleziona una funzione dalla barra in alto. Tutte le librerie sono locali.</p>-->

            <div id="home-drop" class="drop">
                <div class="title">📑 Page Editor</div>
                <div class="sub">Trascina qui uno o più PDF</div>
                <div class="btnRow">
                    <button id="home-pick" class="primary">Seleziona PDF</button>
                    <button id="home-clear">Pulisci</button>
                </div>
                <div id="home-status" class="status muted"></div>
            </div>

            <div id="home-actions" class="actionBar" style="display:none;">
                <button id="home-export" class="primary">Esporta selezione</button>
            </div>
        </div>

        <div class="container" id="container-page"></div>
    </main>

    <!-- Vendor (LOCAL) -->
    <script src="./vendor/sweetalert2.all.min.js"></script>
    <script src="./vendor/pdf-lib.min.js"></script>
    <script src="./vendor/fontkit.umd.min.js"></script>
    <script src="./vendor/pdf.min.js"></script>

    <script>
        // pdf.js worker locale (robusto su file://)
        if (window.pdfjsLib) {
            window.pdfjsLib.GlobalWorkerOptions.workerSrc =
                new URL("./vendor/pdf.worker.min.js", window.location.href).toString();
        }
    </script>

    <!-- App -->
    <script src="./renderer.js"></script>
</body>

</html>
